<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Angel's Family Organizer</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="authView" class="screen">
  <div class="panel auth-panel">
    <h1>Angel's Family Organizer</h1>
    <p class="subtext">Created by Joseph Butcher</p>

    <label>Email</label>
    <input id="authEmail" type="email">

    <label>Password</label>
    <input id="authPassword" type="password">

    <div class="action-row">
      <button id="signInBtn" class="primary">Sign In</button>
      <button id="resetPasswordBtn">Reset Password</button>
    </div>

    <div id="authMessage"></div>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">

<header class="header">
<h1>Family Organizer</h1>
<button id="signOutBtn">Sign Out</button>
</header>

<!-- HOME -->
<section id="homeSection" class="tabSection">
<h2>Home</h2>
<p>Dashboard overview</p>
</section>

<!-- CALENDAR -->
<section id="calendarSection" class="tabSection hidden">
<h2>Calendar</h2>
<p>Appointments and events</p>
</section>

<!-- GOALS -->
<section id="goalsSection" class="tabSection hidden">
<h2>Goals</h2>
<p>Parenting goals and routines</p>
</section>

<!-- NOTES -->
<section id="notesSection" class="tabSection hidden">
<h2>Notes</h2>
<textarea placeholder="Write notes here..."></textarea>
</section>

<!-- REPORTS -->
<section id="reportsSection" class="tabSection hidden">
<h2>Reports</h2>
<button>Print Weekly Report</button>
</section>

<nav class="mobile-nav">
<button class="tabBtn active" data-tab="home">🏠 Home</button>
<button class="tabBtn" data-tab="calendar">📅 Calendar</button>
<button class="tabBtn" data-tab="goals">🎯 Goals</button>
<button class="tabBtn" data-tab="notes">📝 Notes</button>
<button class="tabBtn" data-tab="reports">📊 Reports</button>
</nav>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
